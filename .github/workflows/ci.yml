name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify project layout
        run: |
          test -f app.py
          test -f requirements.txt
          test -f templates/index.html

      - name: Compile Python (syntax only)
        run: |
          python -m compileall -q app.py || (echo "Syntax errors in app.py" && exit 1)

