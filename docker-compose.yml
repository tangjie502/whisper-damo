version: '3.9'

services:
  whisper-damo:
    build:
      context: .
      network: host   # 构建时使用宿主机网络，解决 Docker DNS 异常问题
    image: whisper-damo:latest
    container_name: whisper-damo
    ports:
      - "5050:5050"
    volumes:
      # Whisper / SenseVoice 模型缓存（避免每次重启重新下载）
      - hf_cache:/home/appuser/.cache/huggingface
      # 上传文件与转写结果（可选：持久化）
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      # 可选：Hugging Face 镜像（国内服务器加速下载）
      # - HF_ENDPOINT=https://hf-mirror.com
      # 可选：预设 Azure 凭证（也可在页面手动输入）
      # - VITE_AZURE_SPEECH_KEY=
      # - VITE_AZURE_SPEECH_REGION=eastasia
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # 限制资源（根据实际服务器调整）
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

volumes:
  hf_cache:
    driver: local
